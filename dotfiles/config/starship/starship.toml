# vim:fileencoding=utf-8:foldmethod=marker:foldlevel=1

# https://starship.rs/presets/nerd-font
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$os\
$directory\
${custom.giturl}\
$git_branch\
$git_status\

$fill\

$cmd_duration\
${custom.python_project}\
$time\

$line_break\
$character
"""

[fill]
symbol = " "

# esquerda superior {{{
[os]
disabled = false
style = "cyan"
format = "[$symbol]($style)"

[os.symbols]
Arch = " "

[directory]
style = "cyan"
truncation_length = 5
truncate_to_repo = true
read_only = " "
read_only_style = "red"
format = "[$read_only]($read_only_style)[$path]($style) "

[git_branch]
symbol = " "
style = "green"
format = "[$symbol$branch]($style) "
[git_status]
disabled = false
style = "green"
format = "([$all_status$ahead_behind]($style))"
[custom.giturl_unix]
# disabled = true
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL=" "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL=" "
else
    GIT_REMOTE_SYMBOL=" "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "$output  "
[custom.giturl_pwsh]
# disabled = true
description = "Display symbol for remote Git server (pwsh)"
command = """
$gitRemote = git ls-remote --get-url
$symbol = ' ' # If no Git Remote is returned.
switch -regex ($gitRemote) {\
    'github'    { $symbol = ' ' }\
    'gitlab'    { $symbol = ' ' }\
    'bitbucket' { $symbol = ' ' }\
     Default    { $symbol = ' ' }\
}
echo $symbol
"""
when = "git rev-parse --is-inside-work-tree"
shell = ["pwsh", "-NoProfile", "-Command", "-"]
# }}}

# direita superior {{{
[cmd_duration]
min_time = 500
style = "white"
format = "[ $duration]($style) "

[custom.python_project]
when = '[ -n "$VIRTUAL_ENV" ]'
command = 'basename "$(dirname "$VIRTUAL_ENV")"'
format = "[ $output ]($style)"
style = "yellow"

[time]
disabled = false
style = "cyan"
time_format = "%H:%M:%S"
format = "[ $time]($style)"
# }}}

# inferior {{{
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
# }}}

